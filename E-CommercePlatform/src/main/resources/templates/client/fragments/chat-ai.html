<div th:fragment="chat-widget" id="chat-ai-widget" class="chat-ai-container">
    <button type="button" class="chat-toggle-btn">
        <span class="material-symbols-outlined chat-icon">smart_toy</span>
        <span class="material-symbols-outlined close-icon" style="display: none;">close</span>
    </button>

    <div class="chat-box" id="chatBox" style="display: none;"> <div class="chat-header">
        <div class="ai-avatar"><span class="material-symbols-outlined">bolt</span></div>
        <div class="ai-status">
            <span class="ai-name">Laptop Store AI</span>
            <span class="status-dot"></span>
            <small>Online</small>
        </div>
    </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">Chào bạn! 👋 Tôi có thể giúp gì cho bạn?</div>
        </div>

        <div class="chat-input-area">
            <div class="input-group">
                <input type="text" id="aiInput" placeholder="Hỏi AI về sản phẩm..." onkeypress="handleChatKey(event)">
                <button type="button" onclick="sendChatMessage()" class="send-btn">
                    <span class="material-symbols-outlined">send</span>
                </button>
            </div>
        </div>
    </div>
    <script th:src="@{/client/js/chat-ai.js}"></script>
</div>
