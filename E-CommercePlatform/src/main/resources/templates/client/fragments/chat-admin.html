<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="admin-chat-widget" id="chat-admin-widget" class="chat-admin-container">
  <button type="button" class="chat-toggle-btn admin-theme-btn" onclick="toggleAdminChat()">
    <span class="material-symbols-outlined admin-icon">support_agent</span>
    <span class="material-symbols-outlined close-icon-admin" style="display: none;">close</span>
  </button>

  <div class="chat-box" id="adminChatBox" style="display: none;">
    <div class="chat-header admin-header-bg">
      <div class="logo-icon-wrapper">
        <span class="material-symbols-outlined">person</span>
      </div>
      <div class="ai-status">
        <span class="ai-name">Hỗ trợ viên</span>
        <span class="status-dot"></span>
        <small>Đang trực tuyến</small>
      </div>
    </div>

    <div class="chat-messages" id="adminChatMessages">
      <div class="message bot">Xin chào! Bạn cần hỗ trợ trực tiếp từ nhân viên không ạ?</div>
    </div>

    <div class="chat-input-area">
      <div class="input-group">
        <input type="text" id="adminInput" placeholder="Nhắn tin cho Admin..." onkeypress="handleAdminChatKey(event)">
        <button type="button" onclick="sendAdminChatMessage()" class="send-btn admin-send-btn">
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>
    </div>
  </div>
  <script th:src="@{/client/js/chat-admin.js}"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</div>
</body>
</html>
