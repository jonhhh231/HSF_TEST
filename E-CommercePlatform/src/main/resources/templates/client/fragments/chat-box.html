<div th:fragment="chat-box-widget" id="admin-chat-container" class="admin-chat-wrapper">
    <button type="button" class="admin-chat-toggle-btn" onclick="toggleAdminChat()">
        <span class="material-symbols-outlined chat-icon">support_agent</span>
        <span class="material-symbols-outlined close-icon" style="display: none;">close</span>
    </button>

    <div class="admin-chat-box" id="adminChatBox" style="display: none;">
        <div class="admin-chat-header">
            <div class="admin-status">
                <span class="admin-name">Hỗ trợ trực tuyến (Admin)</span>
                <span class="admin-status-dot"></span>
            </div>
        </div>

        <div class="admin-chat-messages" id="adminChatMessages">
            <div class="admin-message system">Nhân viên sẽ phản hồi bạn sớm nhất có thể...</div>
        </div>

        <div class="admin-chat-input-area">
            <div class="admin-input-group">
                <input type="text" id="adminChatInput" placeholder="Nhắn cho cửa hàng..." onkeypress="handleAdminChatKey(event)">
                <button type="button" onclick="sendAdminMessage()" class="admin-send-btn">
                    <span class="material-symbols-outlined">send</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/client/js/chat-box.js}"></script>
</div>
