<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layouts/default}">
<head>
    <link rel="stylesheet" th:href="@{/admin/assets/css/admin-chat.css}">
</head>

<body>

<div layout:fragment="main">
    <div class="card chat-main-card">
        <div class="row g-0 h-100">
            <div class="col-12 col-lg-4 col-xl-3 border-end chat-sidebar">
                <div class="p-3 border-bottom d-none d-md-block">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1">
                            <input type="text" class="form-control my-2" placeholder="Tìm kiếm khách hàng...">
                        </div>
                    </div>
                </div>

                <div class="list-group list-group-flush chat-user-list">
                    <a href="#" class="list-group-item list-group-item-action border-0 active">
                        <div class="badge bg-success float-end">5</div>
                        <div class="d-flex align-items-start">
                            <div class="chat-avatar me-3">C</div>
                            <div class="flex-grow-1">
                                <strong>Customer A</strong>
                                <div class="small text-muted text-truncate">Sản phẩm này còn hàng không shop?</div>
                            </div>
                        </div>
                    </a>

                    <a href="#" class="list-group-item list-group-item-action border-0">
                        <div class="d-flex align-items-start">
                            <div class="chat-avatar me-3 bg-secondary">B</div>
                            <div class="flex-grow-1">
                                <strong>Nguyễn Văn B</strong>
                                <div class="small text-muted text-truncate">Cảm ơn shop nhé!</div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>

            <div class="col-12 col-lg-8 col-xl-9 d-flex flex-column h-100">
                <div class="py-2 px-4 border-bottom d-none d-lg-block">
                    <div class="d-flex align-items-center py-1">
                        <div class="position-relative">
                            <div class="chat-avatar me-3">C</div>
                        </div>
                        <div class="flex-grow-1 ps-3">
                            <strong>Customer A</strong>
                            <div class="text-muted small"><em>Đang trực tuyến</em></div>
                        </div>
                    </div>
                </div>

                <div class="flex-grow-1 chat-messages p-4" id="adminDetailChat">
                    <div class="chat-message-left pb-4">
                        <div>
                            <div class="chat-avatar bg-secondary text-white">C</div>
                            <div class="text-muted small text-nowrap mt-2">2:33 am</div>
                        </div>
                        <div class="flex-shrink-1 bg-light rounded py-2 px-3 ms-3 message-content">
                            Chào shop, con laptop Gaming Victus này có sẵn tại cửa hàng không ạ?
                        </div>
                    </div>

                    <div class="chat-message-right pb-4">
                        <div>
                            <div class="chat-avatar bg-primary text-white">Ad</div>
                            <div class="text-muted small text-nowrap mt-2">2:34 am</div>
                        </div>
                        <div class="flex-shrink-1 bg-primary text-white rounded py-2 px-3 me-3 message-content">
                            Dạ chào bạn, mẫu này hiện đang sẵn hàng tại cả 3 chi nhánh ạ. Bạn định qua xem máy lúc nào nhỉ?
                        </div>
                    </div>
                </div>

                <div class="flex-grow-0 py-3 px-4 border-top">
                    <div class="input-group">
                        <input type="text" id="adminMainInput" class="form-control" placeholder="Nhập tin nhắn phản hồi...">
                        <button class="btn btn-primary" onclick="adminSendMsg()">Gửi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
